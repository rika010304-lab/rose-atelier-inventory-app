<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>カート | バラ注文アプリ</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="logo-area">
        <p class="logo-sub">Rose Order App</p>
        <h1>バラ注文アプリ</h1>
      </div>

      <nav class="side-nav">
        <a href="index.html">一覧</a>
        <a href="add-flower.html">品種登録</a>
        <a href="order.html" class="active">注文登録</a>
        <a href="waste.html">廃棄登録</a>
        <a href="stock.html">在庫登録</a>
         <a href="welcome.html">ウェルカムページ</a>
      </nav>
    </aside>

    <main class="main-content">
      <header class="page-header">
        <div>
          <p class="page-label">Cart</p>
          <h2>カート内容</h2>
        </div>
      </header>

      <div class="cart-page-layout">
        <section class="content-card">
          <div class="section-head single">
            <div>
              <h3>選択した商品</h3>
              <p>本数を変更できます</p>
            </div>
          </div>

          <div id="cartItems" class="cart-items large-cart-items">
            <p class="empty-cart">まだ商品が入っていません</p>
          </div>
        </section>

        <aside class="content-card">
          <div class="section-head single">
            <div>
              <h3>ご注文内容</h3>
              <p>このあと注文情報を入力します</p>
            </div>
          </div>

          <div class="cart-summary-box">
            <div class="cart-row">
              <span>商品点数</span>
              <strong id="cartCount">0本</strong>
            </div>
            <div class="cart-row">
              <span>商品合計</span>
              <strong id="cartSubtotal">0円</strong>
            </div>
            <div class="shipping-note-box">
              <p>クール宅急便：一律 1,000円</p>
              <p>※ 10,000円以上のご注文で送料無料</p>
            </div>
            <div class="form-actions column-actions">
              <a href="order.html" class="secondary-btn">買い物を続ける</a>
              <a href="#" class="primary-btn" id="goCheckoutBtn">注文を確定する</a>
            </div>
          </div>
        </aside>
      </div>
    </main>
  </div>

  <script>
    const CART_KEY = "rose_cart";
    const cartItems = document.getElementById("cartItems");
    const cartCount = document.getElementById("cartCount");
    const cartSubtotal = document.getElementById("cartSubtotal");
    const goCheckoutBtn = document.getElementById("goCheckoutBtn");

    function getCart() {
      return JSON.parse(localStorage.getItem(CART_KEY) || "[]");
    }

    function saveCart(cart) {
      localStorage.setItem(CART_KEY, JSON.stringify(cart));
      renderCart();
    }

    function formatPrice(price) {
      return price.toLocaleString("ja-JP") + "円";
    }

    function changeQuantity(key, delta) {
      const cart = getCart();
      const item = cart.find(cartItem => cartItem.key === key);
      if (!item) return;

      item.quantity += delta;
      if (item.quantity <= 0) {
        const index = cart.findIndex(i => i.key === key);
        cart.splice(index, 1);
      }

      saveCart(cart);
    }

    function removeFromCart(key) {
      const cart = getCart().filter(item => item.key !== key);
      saveCart(cart);
    }

    function renderCart() {
      const cart = getCart();

      if (cart.length === 0) {
        cartItems.innerHTML = `<p class="empty-cart">まだ商品が入っていません</p>`;
        cartCount.textContent = "0本";
        cartSubtotal.textContent = "0円";
        goCheckoutBtn.classList.add("disabled-link");
        goCheckoutBtn.setAttribute("aria-disabled", "true");
        return;
      }

      goCheckoutBtn.classList.remove("disabled-link");
      goCheckoutBtn.removeAttribute("aria-disabled");

      cartItems.innerHTML = "";
      let totalQuantity = 0;
      let totalPrice = 0;

      cart.forEach(item => {
        const subtotal = item.rose.price * item.quantity;
        totalQuantity += item.quantity;
        totalPrice += subtotal;

        const div = document.createElement("div");
        div.className = "cart-item";
        div.innerHTML = `
          <div class="cart-item-image-wrap">
            <img src="image/rose/${item.rose.folder}/${item.rose.file}.jpg" alt="${item.rose.ja}" class="cart-item-image">
          </div>
          <div class="cart-item-body">
            <div class="cart-item-head">
              <div>
                <h4>${item.rose.ja}</h4>
                <p>${item.rose.color} / ${formatPrice(item.rose.price)} / 1本</p>
              </div>
              <button type="button" class="remove-btn">削除</button>
            </div>
            <div class="cart-qty-row">
              <div class="qty-control">
                <button type="button" class="qty-btn minus">−</button>
                <span class="qty-value">${item.quantity}</span>
                <button type="button" class="qty-btn plus">＋</button>
              </div>
              <strong class="subtotal">${formatPrice(subtotal)}</strong>
            </div>
          </div>
        `;

        div.querySelector(".minus").addEventListener("click", () => changeQuantity(item.key, -1));
        div.querySelector(".plus").addEventListener("click", () => changeQuantity(item.key, 1));
        div.querySelector(".remove-btn").addEventListener("click", () => removeFromCart(item.key));

        cartItems.appendChild(div);
      });

      cartCount.textContent = `${totalQuantity}本`;
      cartSubtotal.textContent = formatPrice(totalPrice);
    }

    renderCart();
    goCheckoutBtn.addEventListener("click", function (e) {
  e.preventDefault();

  const cart = getCart();
  if (cart.length === 0) return;

  let stocks = JSON.parse(localStorage.getItem("stocks") || "[]");

  cart.forEach(item => {
    const stock = stocks.find(s => s.variety === item.rose.ja);

    if (stock) {
      stock.quantity -= item.quantity;

      if (stock.quantity < 0) {
        stock.quantity = 0;
      }
    }
  });

  localStorage.setItem("stocks", JSON.stringify(stocks));

  // カートを空にする
  localStorage.removeItem(CART_KEY);

  alert("注文が完了しました");

  renderCart();
});
  </script>
</body>
</html>
