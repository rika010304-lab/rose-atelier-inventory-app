    const CART_KEY = "rose_cart";
    const flowerGrid = document.getElementById("flowerGrid");
    const filterButtons = document.getElementById("filterButtons");
    const headerCartCount = document.getElementById("headerCartCount");
    let currentFilter = "all";

    function getCart() {
      return JSON.parse(localStorage.getItem(CART_KEY) || "[]");
    }

    function saveCart(cart) {
      localStorage.setItem(CART_KEY, JSON.stringify(cart));
      updateHeaderCartCount();
    }

    function updateHeaderCartCount() {
      const cart = getCart();
      const count = cart.reduce((sum, item) => sum + item.quantity, 0);
      headerCartCount.textContent = count;
    }

    function getItemKey(rose) {
      return `${rose.folder}/${rose.file}`;
    }

    function addToCart(rose, quantity = 1) {
      const cart = getCart();
      const key = getItemKey(rose);
      const existing = cart.find(item => item.key === key);

      if (existing) {
        existing.quantity += quantity;
      } else {
        cart.push({
          key,
          rose,
          quantity
        });
      }

      saveCart(cart);
    }

    function getColorClass(color) {
      switch (color) {
        case "ピンク":
          return "soft-pink";
        case "レッド":
          return "soft-red";
        case "イエロー":
          return "soft-yellow";
        case "ホワイト":
          return "soft-white";
        case "グリーン":
          return "soft-green";
        case "オレンジ":
          return "soft-orange";
        case "その他":
          return "soft-other";
        default:
          return "";
      }
    }

    function formatPrice(price) {
      return price.toLocaleString("ja-JP") + "円";
    }

function renderCards() {
  flowerGrid.innerHTML = "";

  const stocks = JSON.parse(localStorage.getItem("stocks") || "[]");

  const filtered = currentFilter === "all"
    ? roseData
    : roseData.filter(rose => rose.color === currentFilter);

  filtered.forEach(rose => {
    const article = document.createElement("article");
    article.className = "flower-card";

    const stock = stocks.find(s => s.variety === rose.ja);
    const stockQuantity = stock ? Number(stock.quantity) : 0;
    const isSoldOut = !stock || stockQuantity === 0;

    const featureTags = [];
    if (rose.longLasting) {
      featureTags.push(`<span class="feature-tag long">日持ち</span>`);
    }
    if (rose.fragrant) {
      featureTags.push(`<span class="feature-tag aroma">香り</span>`);
    }

    if (isSoldOut) {
      featureTags.push(`<span class="feature-tag soldout">売り切れ</span>`);
    }

    const featureTagHTML = featureTags.length > 0
      ? `<div class="feature-tag-group image-feature-tags">${featureTags.join("")}</div>`
      : "";

    article.innerHTML = `
      <div class="flower-image-wrap">
        <img
          src="image/rose/${rose.folder}/${rose.file}.jpg"
          alt="バラ ${rose.color} ${rose.ja}"
          class="flower-image"
        >
        ${featureTagHTML}
      </div>

      <div class="flower-card-body">
        <div class="tag-group">
          <span class="tag">バラ</span>
          <span class="soft-color-tag ${getColorClass(rose.color)}">${rose.color}</span>
        </div>

        <h3 class="flower-name">${rose.ja}</h3>
        <p class="flower-en-name">${rose.en}</p>
        <p class="flower-price">${formatPrice(rose.price)} / 1本</p>

        <div class="card-order-row">
          <select class="qty-select" ${isSoldOut ? "disabled" : ""}>
            <option value="1">1本</option>
            <option value="2">2本</option>
            <option value="3">3本</option>
            <option value="5">5本</option>
            <option value="10">10本</option>
          </select>
          <button type="button" class="primary-btn card-btn" ${isSoldOut ? "disabled" : ""}>
            ${isSoldOut ? "売り切れ" : "カートに追加"}
          </button>
        </div>
      </div>
    `;

   const qtySelect = article.querySelector(".qty-select");
const cardBtn = article.querySelector(".card-btn");

cardBtn.addEventListener("click", () => {
  const quantity = Number(qtySelect.value);

  if (isSoldOut) {
    alert("売り切れの商品です");
    return;
  }

  if (quantity > stockQuantity) {
    alert(`在庫数を超えています。現在の在庫は${stockQuantity}本です。`);
    return;
  }

  addToCart(rose, quantity);
  renderCards();
});

flowerGrid.appendChild(article);
  });
}

    filterButtons.addEventListener("click", (e) => {
      const btn = e.target.closest(".chip");
      if (!btn) return;

      document.querySelectorAll(".chip").forEach(chip => chip.classList.remove("active"));
      btn.classList.add("active");
      currentFilter = btn.dataset.filter;
      renderCards();
    });

    updateHeaderCartCount();
    renderCards();
  </script>
