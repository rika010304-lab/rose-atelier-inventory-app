<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>廃棄登録 | 花屋在庫管理アプリ</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="logo-area">
        <p class="logo-sub">Flower Shop</p>
        <h1>在庫管理アプリ</h1>
      </div>

      <nav class="side-nav">
        <a href="index.html">花一覧</a>
        <a href="add-flower.html">花を登録</a>
        <a href="order.html">注文登録</a>
        <a href="waste.html" class="active">廃棄登録</a>
      </nav>
    </aside>

    <main class="main-content">
      <header class="page-header">
        <div>
          <p class="page-label">Waste</p>
          <h2>廃棄登録</h2>
        </div>
      </header>

      <section class="content-card form-card">
        <div class="section-head single">
          <div>
            <h3>廃棄情報を登録</h3>
            <p>ロスの見える化につながる重要データです</p>
          </div>
        </div>

        <form>
          <div class="form-grid">
            <div class="form-group">
              <label for="waste-flower-name">花名</label>
              <select id="waste-flower-name" name="waste-flower-name">
                <option>バラ</option>
                <option>カーネーション</option>
                <option>ガーベラ</option>
                <option>トルコキキョウ</option>
              </select>
            </div>

            <div class="form-group">
              <label for="waste-quantity">廃棄本数</label>
              <input type="number" id="waste-quantity" name="waste-quantity" placeholder="例：3">
            </div>

            <div class="form-group">
              <label for="waste-date">廃棄日</label>
              <input type="date" id="waste-date" name="waste-date">
            </div>

            <div class="form-group">
              <label for="waste-reason">理由</label>
              <select id="waste-reason" name="waste-reason">
                <option>鮮度低下</option>
                <option>折れ・傷み</option>
                <option>売れ残り</option>
                <option>その他</option>
              </select>
            </div>

            <div class="form-group full-width">
              <label for="waste-note">詳細メモ</label>
              <textarea id="waste-note" name="waste-note" rows="4" placeholder="例：高温で傷みが早かった"></textarea>
            </div>
          </div>

          <div class="form-actions">
            <a href="index.html" class="secondary-btn">戻る</a>
            <button type="submit" class="primary-btn">廃棄を登録</button>
          </div>
        </form>
      </section>
    </main>
  </div>
</body>
</html>
