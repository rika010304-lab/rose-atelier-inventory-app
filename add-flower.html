<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>花を登録 | 花屋在庫管理アプリ</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="logo-area">
        <p class="logo-sub">Flower Shop</p>
        <h1>在庫管理アプリ</h1>
      </div>

      <nav class="side-nav">
        <a href="index.html">花一覧</a>
        <a href="add-flower.html" class="active">花を登録</a>
        <a href="order.html">注文登録</a>
        <a href="waste.html">廃棄登録</a>
      </nav>
    </aside>

    <main class="main-content">
      <header class="page-header">
        <div>
          <p class="page-label">Register</p>
          <h2>花を登録</h2>
        </div>
      </header>

      <section class="content-card form-card">
        <div class="section-head single">
          <div>
            <h3>新しい花を登録</h3>
            <p>商品情報を入力してください</p>
          </div>
        </div>

        <form>
          <div class="form-grid">
            <div class="form-group">
              <label for="name">花名</label>
              <input type="text" id="name" name="name" placeholder="例：バラ">
            </div>

            <div class="form-group">
              <label for="color">色</label>
              <input type="text" id="color" name="color" placeholder="例：赤">
            </div>

            <div class="form-group">
              <label for="price">単価</label>
              <input type="number" id="price" name="price" placeholder="例：300">
            </div>

            <div class="form-group">
              <label for="stock">在庫数</label>
              <input type="number" id="stock" name="stock" placeholder="例：20">
            </div>

            <div class="form-group">
              <label for="arrival-date">入荷日</label>
              <input type="date" id="arrival-date" name="arrival-date">
            </div>

            <div class="form-group">
              <label for="note">メモ</label>
              <input type="text" id="note" name="note" placeholder="例：母の日用に多めに仕入れ">
            </div>
          </div>

          <div class="form-actions">
            <a href="index.html" class="secondary-btn">戻る</a>
            <button type="submit" class="primary-btn">登録する</button>
          </div>
        </form>
      </section>
    </main>
  </div>
</body>
</html>
