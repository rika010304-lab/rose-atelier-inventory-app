<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>品種登録 | バラ注文アプリ</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="logo-area">
        <p class="logo-sub">Rose Order App</p>
        <h1>バラ注文アプリ</h1>
      </div>

      <nav class="side-nav">
  <a href="index.html">在庫一覧</a>
  <a href="add-flower.html" class="active">品種登録</a>
  <a href="stock.html">在庫登録</a>
  <a href="order.html">注文登録</a>
  <a href="waste.html">廃棄登録</a>

  <div class="nav-divider"></div>

  <a href="welcome.html" class="back-home">← ウェルカムへ戻る</a>
</nav>
    </aside>

    <main class="main-content">
      <header class="page-header">
        <div>
          <p class="page-label">Register</p>
          <h2>品種登録</h2>
        </div>
      </header>

      <section class="content-card form-card">
        <div class="section-head single">
          <div>
            <h3>新しいバラ品種を登録</h3>
            <p>品種情報、価格、画像情報を入力してください</p>
          </div>
        </div>

        <form>
          <div class="form-grid">
            <div class="form-group">
              <label for="rose-color">色</label>
              <select id="rose-color" name="rose-color">
                <option>ピンク</option>
                <option>レッド</option>
                <option>イエロー</option>
                <option>ホワイト</option>
                <option>グリーン</option>
                <option>オレンジ</option>
                <option>その他</option>
              </select>
            </div>

            <div class="form-group">
              <label for="rose-name-ja">品種名（日本語）</label>
              <input type="text" id="rose-name-ja" name="rose-name-ja" placeholder="例：アバランチェ">
            </div>

            <div class="form-group">
              <label for="rose-name-en">品種名（英語）</label>
              <input type="text" id="rose-name-en" name="rose-name-en" placeholder="例：Avalanche">
            </div>

            <div class="form-group">
              <label for="price">価格</label>
              <input type="number" id="price" name="price" placeholder="例：650">
            </div>

            <div class="form-group">
              <label for="stock">在庫数</label>
              <input type="number" id="stock" name="stock" placeholder="例：20">
            </div>

            <div class="form-group">
              <label for="arrival-date">入荷日</label>
              <input type="date" id="arrival-date" name="arrival-date">
            </div>

            <div class="form-group">
              <label for="rose-image">画像登録</label>
              <input type="file" id="rose-image" name="rose-image" accept=".jpg,.jpeg,.png,.webp">
            </div>

            <div class="form-group">
              <label for="rose-path">画像パス</label>
              <input type="text" id="rose-path" name="rose-path" placeholder="例：image/rose/rose-white/avalanche.jpg">
            </div>

            <div class="form-group checkbox-group">
              <label><input type="checkbox" name="long-lasting"> 日持ち品種</label>
              <label><input type="checkbox" name="fragrant"> 香りバラ</label>
            </div>

            <div class="form-group full-width">
              <label for="note">メモ</label>
              <textarea id="note" name="note" rows="4" placeholder="例：ギフト向き。白系の定番品種。"></textarea>
            </div>
          </div>

          <div class="form-actions">
            <a href="index.html" class="secondary-btn">戻る</a>
            <button type="submit" class="primary-btn">登録する</button>
          </div>
        </form>
      </section>
    </main>
  </div>
</body>
</html>
