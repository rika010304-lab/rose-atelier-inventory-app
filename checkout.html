<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ご注文手続き | バラ注文アプリ</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="logo-area">
        <p class="logo-sub">Rose Order App</p>
        <h1>バラ注文アプリ</h1>
      </div>

      <nav class="side-nav">
        <a href="index.html">一覧</a>
        <a href="add-flower.html">品種登録</a>
        <a href="order.html" class="active">注文登録</a>
       <a href="stock.html">在庫登録</a>
         <a href="welcome.html">ウェルカムページ</a>
      </nav>
    </aside>

    <main class="main-content">
      <header class="page-header">
        <div>
          <p class="page-label">Checkout</p>
          <h2>ご注文手続き</h2>
        </div>
      </header>

      <div class="checkout-layout">
        <section class="content-card">
          <div class="section-head single">
            <div>
              <h3>注文情報を入力</h3>
              <p>お届け先やお支払い方法を入力してください</p>
            </div>
          </div>

          <form class="checkout-form">
            <section class="checkout-section">
              <h4>注文者情報</h4>
              <div class="form-grid">
                <div class="form-group">
                  <label for="customerName">お名前</label>
                  <input type="text" id="customerName" placeholder="例：山田 花子">
                </div>
                <div class="form-group">
                  <label for="customerPhone">電話番号</label>
                  <input type="text" id="customerPhone" placeholder="例：090-1234-5678">
                </div>
                <div class="form-group full-width">
                  <label for="customerAddress">住所</label>
                  <input type="text" id="customerAddress" placeholder="例：東京都〇〇区〇〇1-2-3">
                </div>
              </div>
            </section>

            <section class="checkout-section">
              <h4>お届け先</h4>
              <div class="radio-group">
                <label class="radio-option">
                  <input type="radio" name="recipientType" value="same" checked>
                  注文者と同じ
                </label>
                <label class="radio-option">
                  <input type="radio" name="recipientType" value="different">
                  別の送り先
                </label>
              </div>

              <div id="recipientFields" class="recipient-fields hidden-section">
                <div class="form-grid">
                  <div class="form-group">
                    <label for="recipientName">送り先のお名前</label>
                    <input type="text" id="recipientName" placeholder="例：佐藤 一郎">
                  </div>
                  <div class="form-group">
                    <label for="recipientPhone">送り先の電話番号</label>
                    <input type="text" id="recipientPhone" placeholder="例：080-1111-2222">
                  </div>
                  <div class="form-group full-width">
                    <label for="recipientAddress">送り先の住所</label>
                    <input type="text" id="recipientAddress" placeholder="例：大阪府〇〇市〇〇3-4-5">
                  </div>
                </div>
              </div>
            </section>

            <section class="checkout-section">
              <h4>配送・備考</h4>
              <div class="shipping-box">
                <p><strong>配送方法：</strong>クール宅急便</p>
                <p><strong>送料：</strong>一律 1,000円</p>
                <p class="free-shipping-note">※ 10,000円以上のご注文で送料無料です</p>
              </div>

              <div class="form-grid">
                <div class="form-group">
                  <label for="orderDate">注文日</label>
                  <input type="date" id="orderDate">
                </div>
                <div class="form-group full-width">
                  <label for="orderNote">備考</label>
                  <textarea id="orderNote" rows="4" placeholder="例：誕生日用なので明るい印象でお願いします"></textarea>
                </div>
              </div>
            </section>

            <section class="checkout-section">
              <h4>決済方法</h4>
              <div class="radio-group payment-group">
                <label class="radio-card">
                  <input type="radio" name="paymentMethod" value="card" checked>
                  <span>クレジットカード</span>
                </label>
                <label class="radio-card">
                  <input type="radio" name="paymentMethod" value="barcode">
                  <span>バーコード決済（PayPay / 楽天ペイ など）</span>
                </label>
              </div>
            </section>

            <div class="form-actions">
              <a href="cart.html" class="secondary-btn">カートに戻る</a>
              <button type="submit" class="primary-btn">注文を確定する</button>
            </div>
          </form>
        </section>

        <aside class="content-card order-summary-panel">
          <div class="section-head single">
            <div>
              <h3>ご注文内容</h3>
              <p>最終確認</p>
            </div>
          </div>

          <div id="checkoutItems" class="checkout-items"></div>

          <div class="checkout-summary-box">
            <div class="cart-row">
              <span>商品合計</span>
              <strong id="checkoutSubtotal">0円</strong>
            </div>
            <div class="cart-row">
              <span>送料</span>
              <strong id="checkoutShipping">0円</strong>
            </div>
            <div class="cart-row total">
              <span>総合計</span>
              <strong id="checkoutTotal">0円</strong>
            </div>
          </div>
        </aside>
      </div>
    </main>
  </div>

  <script>
    const CART_KEY = "rose_cart";
    const SHIPPING_FEE = 1000;
    const FREE_SHIPPING_THRESHOLD = 10000;

    const recipientFields = document.getElementById("recipientFields");
    const recipientRadios = document.querySelectorAll('input[name="recipientType"]');
    const checkoutItems = document.getElementById("checkoutItems");
    const checkoutSubtotal = document.getElementById("checkoutSubtotal");
    const checkoutShipping = document.getElementById("checkoutShipping");
    const checkoutTotal = document.getElementById("checkoutTotal");

    function getCart() {
      return JSON.parse(localStorage.getItem(CART_KEY) || "[]");
    }

    function formatPrice(price) {
      return price.toLocaleString("ja-JP") + "円";
    }

    function toggleRecipientFields() {
      const selected = document.querySelector('input[name="recipientType"]:checked').value;
      recipientFields.classList.toggle("hidden-section", selected === "same");
    }

    function renderCheckout() {
      const cart = getCart();

      if (cart.length === 0) {
        checkoutItems.innerHTML = `<p class="empty-cart">カートに商品がありません。先に商品を追加してください。</p>`;
        checkoutSubtotal.textContent = "0円";
        checkoutShipping.textContent = "0円";
        checkoutTotal.textContent = "0円";
        return;
      }

      checkoutItems.innerHTML = "";
      let subtotal = 0;

      cart.forEach(item => {
        const itemTotal = item.rose.price * item.quantity;
        subtotal += itemTotal;

        const div = document.createElement("div");
        div.className = "checkout-item";
        div.innerHTML = `
          <div class="checkout-item-row">
            <span>${item.rose.ja}</span>
            <strong>${item.quantity}本</strong>
          </div>
          <div class="checkout-item-row sub-row">
            <span>${formatPrice(item.rose.price)} × ${item.quantity}</span>
            <strong>${formatPrice(itemTotal)}</strong>
          </div>
        `;
        checkoutItems.appendChild(div);
      });

      const shipping = subtotal >= FREE_SHIPPING_THRESHOLD ? 0 : SHIPPING_FEE;
      const total = subtotal + shipping;

      checkoutSubtotal.textContent = formatPrice(subtotal);
      checkoutShipping.textContent = shipping === 0 ? "送料無料" : formatPrice(shipping);
      checkoutTotal.textContent = formatPrice(total);
    }

    recipientRadios.forEach(radio => {
      radio.addEventListener("change", toggleRecipientFields);
    });

    toggleRecipientFields();
    renderCheckout();
  </script>
</body>
</html>
