<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理画面 | バラ注文アプリ</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="logo-area">
        <p class="logo-sub">Rose Order App</p>
        <h1>管理画面</h1>
      </div>

<nav class="side-nav">
  <a href="index.html" class="active">在庫一覧</a>
  <a href="add-flower.html">品種登録</a>
  <a href="stock.html">在庫登録</a>
  <a href="order.html">注文登録</a>
  <a href="waste.html">廃棄登録</a>

  <div class="nav-divider"></div>

  <a href="welcome.html" class="back-home">← ウェルカムへ戻る</a>
</nav>
    </aside>

    <main class="main-content">
      <header class="page-header">
        <div>
          <p class="page-label">Admin Dashboard</p>
          <h2>バラ在庫管理</h2>
        </div>
        <a href="add-flower.html" class="primary-btn">＋ 品種を登録</a>
      </header>

      <section class="summary-grid">
        <article class="summary-card">
          <p class="summary-title">登録品種数</p>
          <p class="summary-value">66</p>
        </article>
        <article class="summary-card">
          <p class="summary-title">日持ち品種</p>
          <p class="summary-value">27</p>
        </article>
        <article class="summary-card">
          <p class="summary-title">香りバラ</p>
          <p class="summary-value">7</p>
        </article>
      </section>

      
      <section class="content-card">
        <div class="section-head">
          <div>
            <h3>在庫一覧</h3>
            <p>色・特徴・画像を含めて管理できます</p>
          </div>
          <input type="text" class="search-box" placeholder="品種名で検索">
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>画像</th>
                <th>色</th>
                <th>品種名</th>
                <th>英語名</th>
                <th>価格</th>
                <th>在庫数</th>
                <th>特徴</th>
                <th>入荷日</th>
                <th>状態</th>
              </tr>
            </thead>
           <tbody id="stock-table-body"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>
  <script>
  const stockTableBody = document.getElementById("stock-table-body");
  const stocks = JSON.parse(localStorage.getItem("stocks") || "[]");

  if (stocks.length === 0) {
    stockTableBody.innerHTML = `
      <tr>
        <td colspan="9">まだ在庫が登録されていません</td>
      </tr>
    `;
  } else {
    stocks.forEach(stock => {
      let status = '';

if (stock.quantity === 0) {
  status = '<span class="status out">売り切れ</span>';
} else if (stock.quantity >= 10) {
  status = '<span class="status ok">在庫あり</span>';
} else {
  status = '<span class="status low">残り少なめ</span>';
}

      const tr = document.createElement("tr");

      tr.innerHTML = `
        <td>
          <div class="admin-thumb">
            <img src="${stock.image}" alt="${stock.variety}">
          </div>
        </td>

        <td><span class="soft-color-tag">${stock.color}</span></td>

        <td>${stock.variety}</td>
        <td>-</td>

        <td>${stock.price ? stock.price.toLocaleString("ja-JP") + "円" : "-"}</td>

        <td>${stock.quantity}本</td>

        <td>-</td>

        <td>${stock.date || "-"}</td>

        <td>${status}</td>
      `;

      stockTableBody.appendChild(tr);
    });
  }
</script>
</body>
</html>
